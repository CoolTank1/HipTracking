<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>BLT</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BLT">
<meta name="theme-color" content="#FAF3EF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF4EF;
    --bg-2: #F5E9E2;
    --surface: #FFFFFF;
    --border: #EEDDD3;
    --text: #3E2C34;
    --text-dim: #8A7A80;
    --text-faint: #B7A9AE;
    --rose: #D88C9A;
    --rose-deep: #B8677A;
    --rose-pale: #F7E3E7;
    --sage: #8FAE96;
    --sage-pale: #E6EFE7;
    --gold: #E0A96D;
    --gold-pale: #FBEEDD;
    --radius: 20px;
    --shadow: 0 10px 30px -12px rgba(184, 103, 122, 0.22);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0;
    background: radial-gradient(circle at 20% -10%, #FDF0EA 0%, var(--bg) 45%, var(--bg-2) 100%);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100dvh;
    overscroll-behavior-y: none;
  }
  body{
    padding: max(22px, env(safe-area-inset-top)) 20px max(30px, env(safe-area-inset-bottom));
    max-width: 480px; margin: 0 auto;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--rose-deep); margin: 0 0 4px; font-weight: 500;
  }
  h1{
    font-family:'Fraunces', serif; font-weight: 600; font-size: 32px;
    margin: 0 0 22px; letter-spacing: -0.01em; color: var(--text);
  }

  /* streak card */
  .streak-card{
    background: linear-gradient(155deg, #FFFFFF 0%, var(--rose-pale) 130%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    display:flex; align-items:center; gap:16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .streak-flame{
    font-size: 34px; line-height:1; filter: drop-shadow(0 2px 4px rgba(224,169,109,.35));
  }
  .streak-num{
    font-family:'Fraunces', serif; font-weight: 700; font-size: 34px; color: var(--rose-deep);
    line-height: 1;
  }
  .streak-label{
    font-size: 12.5px; color: var(--text-dim); margin-top: 3px; font-weight: 500;
  }
  .streak-best{
    margin-left:auto; text-align:right;
  }
  .streak-best .n{ font-family:'IBM Plex Mono', monospace; font-size: 16px; color: var(--gold); }
  .streak-best .l{ font-size: 10.5px; color: var(--text-faint); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }

  .log-btn{
    width: 100%; border: none; border-radius: 24px;
    background: linear-gradient(180deg, #E7A3AF, var(--rose-deep));
    color: #fff; font-family:'Fraunces', serif; font-weight: 600;
    font-size: 22px; padding: 30px 0; cursor: pointer;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    transition: transform .08s ease;
    box-shadow: 0 14px 30px -10px rgba(184,103,122,0.45);
  }
  .log-btn:active{ transform: scale(0.97); }
  .log-btn .sub{
    font-family:'Inter',sans-serif; font-weight:500; font-size:12.5px;
    color: #fff; opacity: .85; letter-spacing: 0.01em;
  }

  /* quote banner */
  .quote-banner{
    display:none;
    margin-top: 16px;
    background: linear-gradient(155deg, var(--gold-pale), #FFFDF9);
    border: 1px solid #F0DDBB;
    border-radius: var(--radius);
    padding: 22px 22px 20px;
    text-align:center;
    box-shadow: var(--shadow);
  }
  .quote-banner.show{ display:block; animation: fadeUp .4s ease; }
  @keyframes fadeUp{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform: translateY(0);} }
  .quote-mark{ font-family:'Fraunces', serif; font-size: 30px; color: var(--gold); line-height:.4; }
  .quote-text{
    font-family:'Fraunces', serif; font-weight: 500; font-size: 22px; line-height: 1.35;
    color: #6B4B2A; margin: 10px 0 4px; letter-spacing: -0.01em;
  }

  .toast{
    margin-top: 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 18px 20px; display: none;
    box-shadow: var(--shadow);
  }
  .toast.show{ display:block; animation: fadeUp .3s ease; }
  .toast-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .toast-head span{ font-size: 13px; color: var(--text-dim); }
  .toast-head .time{ font-family:'IBM Plex Mono', monospace; color: var(--rose-deep); font-size:13px; }
  .close-x{
    background:none; border:none; color:var(--text-faint); font-size:20px;
    cursor:pointer; line-height:1; padding:4px;
  }
  .field-label{ font-size: 12.5px; color: var(--text-dim); margin: 14px 0 8px; font-weight:500; }
  .field-label:first-of-type{ margin-top:0; }
  .hip-wrap{ display:flex; justify-content:center; padding: 4px 0 2px; }
  .hip-side{ cursor:pointer; transition: opacity .15s; }
  .hip-side rect, .hip-side circle{ transition: fill .15s, stroke .15s; }
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    border: 1px solid var(--border); background: var(--bg); color: var(--text-dim);
    border-radius: 999px; padding: 8px 14px; font-size: 13px; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .chip.active{ background: var(--sage-pale); border-color: var(--sage); color: #3D5C43; }
  textarea{
    width:100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); padding: 10px 12px; font-family:'Inter',sans-serif;
    font-size: 14px; resize: vertical; min-height: 54px;
  }
  textarea::placeholder{ color: var(--text-faint); }
  .save-btn{
    width:100%; margin-top:16px; background: var(--sage); border:none; border-radius:12px;
    color:#fff; font-weight:600; font-size:14px; padding:12px 0; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .stats{ display:flex; gap:10px; margin: 22px 0 8px; }
  .stat{
    flex:1; background: var(--surface); border:1px solid var(--border); border-radius: 14px;
    padding: 12px 14px; box-shadow: 0 6px 16px -10px rgba(184,103,122,0.25);
  }
  .stat .n{ font-family:'IBM Plex Mono', monospace; font-size:19px; color:var(--text); }
  .stat .l{ font-size: 11px; color: var(--text-faint); margin-top:2px; }
  .section-head{ display:flex; justify-content:space-between; align-items:baseline; margin: 26px 0 10px; }
  .section-head h2{
    font-family:'Fraunces', serif; font-weight:600; font-size:17px; margin:0; color:var(--text);
  }
  .tools{ display:flex; gap:14px; }
  .tools button{
    background:none; border:none; color: var(--rose-deep); font-size:12px;
    font-family:'IBM Plex Mono', monospace; cursor:pointer; padding:0;
  }
  .empty{
    text-align:center; color: var(--text-faint); font-size: 13.5px; padding: 40px 10px;
    border: 1px dashed var(--border); border-radius: var(--radius); background: var(--surface);
  }
  .day-group{ margin-bottom: 18px; }
  .day-label{
    font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  }
  .entry{
    background: var(--surface); border:1px solid var(--border); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 8px; cursor:pointer;
    box-shadow: 0 6px 16px -12px rgba(184,103,122,0.2);
  }
  .entry-top{ display:flex; justify-content:space-between; align-items:center; }
  .entry-time{ font-family:'IBM Plex Mono', monospace; font-size: 14px; color: var(--text); }
  .entry-meta{ font-size: 12px; color: var(--text-faint); }
  .entry-detail{ margin-top: 8px; font-size: 13px; color: var(--text-dim); display:none; }
  .entry.open .entry-detail{ display:block; }
  .del{
    color: var(--rose-deep); background:none; border:none; font-size:12px; margin-top:10px;
    cursor:pointer; font-family:'IBM Plex Mono', monospace; padding:0;
  }
  .edit{
    color: var(--sage); background:none; border:none; font-size:12px; margin-top:10px;
    margin-right: 16px;
    cursor:pointer; font-family:'IBM Plex Mono', monospace; padding:0;
  }
  footer{
    text-align:center; color: var(--text-faint); font-size: 11px; margin: 30px 0 10px;
    font-family:'IBM Plex Mono', monospace;
  }
  #importFile{ display:none; }
</style>
</head>
<body>

  <p class="eyebrow">Bilateral Labrum Tear · episode tracker</p>
  <h1>BLT</h1>

  <div class="streak-card">
    <div class="streak-flame">🔥</div>
    <div>
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label" id="streakLabel">days since last catch</div>
    </div>
    <div class="streak-best">
      <div class="n" id="streakBest">0</div>
      <div class="l">best streak</div>
    </div>
  </div>

  <button class="log-btn" id="logBtn">
    Log it now
  </button>

  <div class="quote-banner" id="quoteBanner">
    <div class="quote-mark">“</div>
    <div class="quote-text" id="quoteText"></div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-head">
      <span><span id="toastLabel">Logged</span> <span class="time" id="toastTime"></span></span>
      <button class="close-x" id="toastClose" aria-label="Dismiss">×</button>
    </div>

    <div class="field-label">Which side</div>
    <div class="hip-wrap">
      <svg width="180" height="120" viewBox="0 0 180 120">
        <g class="hip-side" id="hipLeft">
          <circle cx="60" cy="55" r="34" fill="#F5E9E2" stroke="#EEDDD3" stroke-width="2"/>
          <text x="60" y="60" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" fill="#8A7A80">L</text>
        </g>
        <g class="hip-side" id="hipRight">
          <circle cx="120" cy="55" r="34" fill="#F5E9E2" stroke="#EEDDD3" stroke-width="2"/>
          <text x="120" y="60" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" fill="#8A7A80">R</text>
        </g>
        <rect x="70" y="30" width="40" height="50" rx="18" fill="#FFFFFF" stroke="#EEDDD3" stroke-width="2"/>
      </svg>
    </div>

    <div class="field-label">Duration</div>
    <div class="chip-row" id="durationChips">
      <div class="chip" data-val="under 1 min">under 1 min</div>
      <div class="chip" data-val="1–5 min">1–5 min</div>
      <div class="chip" data-val="5–15 min">5–15 min</div>
      <div class="chip" data-val="15+ min">15+ min</div>
    </div>

    <div class="field-label">Notes</div>
    <textarea id="notesInput" placeholder="What were you doing, how bad, anything else"></textarea>

    <button class="save-btn" id="saveDetails">Save details</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="statTotal">0</div><div class="l">total logged</div></div>
    <div class="stat"><div class="n" id="statWeek">0</div><div class="l">last 7 days</div></div>
    <div class="stat"><div class="n" id="statSide">–</div><div class="l">most common side</div></div>
  </div>

  <div class="section-head">
    <h2>History</h2>
    <div class="tools">
      <button id="exportBtn">export</button>
      <button id="importBtn">import</button>
    </div>
  </div>
  <input type="file" id="importFile" accept="application/json">

  <div id="list"></div>

  <footer>stored only on this device, in this browser</footer>

<script>
(function(){
  const STORAGE_KEY = 'hipCatchLog_entries';
  const META_KEY = 'hipCatchLog_meta'; // { firstUse, bestStreak }
  let entries = [];
  let meta = { firstUse: null, bestStreak: 0 };
  let pendingId = null;
  let pendingSide = new Set();

  // ---- fill your quotes in here, comma-separated, each wrapped in quotes ----
  const QUOTES = [
    "You are not your worst day.",
    "Pain is loud, but it isn't the whole story.",
    "Rest is not quitting.",
    "You've gotten through every hard moment so far. That's undefeated.",
    "This will pass. It always has.",
    "Slow is still moving.",
    "You're allowed to have a body that needs patience.",
    "One catch doesn't erase your progress.",
    "Healing isn't a straight line, and that's normal.",
    "You know your body better than anyone else in the room.",
    "Today's pain isn't a verdict on tomorrow.",
    "Strength looks like asking for help too.",
    "You showed up for yourself by logging this.",
    "Your worth was never tied to how your hips feel today.",
    "Small steps still count as steps.",
    "You're doing hard things quietly, and that matters.",
    "It's okay to be tired of being tough.",
    "This moment is data, not a defeat.",
    "You are allowed to take up space while healing.",
    "Every day you track this is a day you're taking care of yourself.",
    "Some days the win is just getting back up.",
    "You don't have to be positive to be strong.",
    "Your patience with your own body is a kind of courage.",
    "This is hard. You're still here.",
    "Progress doesn't always feel like progress in the moment.",
    "Your hip really said \"not today\" and meant it.",
    "Two torn labrums and still out here living your life? Iconic.",
    "Your hips have more drama than a reality show.",
    "Officially the least chill joints in the group chat.",
    "Somewhere, a hip surgeon is thinking about you.",
    "Your body: plot twist enthusiast.",
    "You didn't choose the catchy life, the catchy life chose you.",
    "Bones: 0. You: still standing (eventually).",
    "Your hips are out here cosplaying as a rusty gate.",
    "This is why we can't have nice things, said your labrum.",
    "Achievement unlocked: horizontal for 15 minutes, no regrets.",
    "Your joints have opinions and they will be heard.",
    "Filing this under \"things my hips did instead of asking.\"",
    "Bilateral chaos, unilateral attitude.",
    "You vs. your hip: an ongoing rivalry.",
    "Your cartilage is out here improvising.",
    "Not all heroes wear capes, some just try to stand up.",
    "Your hips called an unscheduled meeting again.",
    "Breaking news: local hip refuses to cooperate, film at 11.",
    "Your body really said \"let's keep things interesting.\"",
    "Cartilage: please see HR, this behavior is unacceptable.",
    "You're basically a weather system at this point — unpredictable and worth tracking.",
    "Your hip joints are freelancers now, apparently.",
    "Plot armor's still intact, hip's just being extra.",
    "Chronic tear, chronic personality — a real range.",
    "Try and fake stand up while sitting next time - Your Dad",
    "Your grabber could have prevented this",
    "Do you want some blanket - Ashton"
    
  ];
  // ---------------------------------------------------------------------------

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    }catch(e){ entries = []; }
    try{
      const rawMeta = localStorage.getItem(META_KEY);
      meta = rawMeta ? JSON.parse(rawMeta) : { firstUse: new Date().toISOString(), bestStreak: 0 };
    }catch(e){ meta = { firstUse: new Date().toISOString(), bestStreak: 0 }; }
    if(!meta.firstUse) meta.firstUse = new Date().toISOString();
    saveMeta();
  }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
  function saveMeta(){ localStorage.setItem(META_KEY, JSON.stringify(meta)); }

  function startOfDay(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
  function daysBetween(a,b){ return Math.round((startOfDay(b) - startOfDay(a)) / 86400000); }

  function fmtTime(iso){
    const d = new Date(iso);
    return d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  }
  function fmtDay(iso){
    const d = new Date(iso);
    const today = new Date();
    const yest = new Date(); yest.setDate(today.getDate()-1);
    const sameDay = (a,b)=> a.toDateString()===b.toDateString();
    if(sameDay(d, today)) return 'Today';
    if(sameDay(d, yest)) return 'Yesterday';
    return d.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
  }

  function currentStreak(){
    const today = new Date();
    let lastIncident = null;
    entries.forEach(e => {
      const t = new Date(e.timestamp);
      if(!lastIncident || t > lastIncident) lastIncident = t;
    });
    const baseline = lastIncident || new Date(meta.firstUse);
    let streak = daysBetween(baseline, today);
    if(streak < 0) streak = 0;
    return streak;
  }

  function renderStreak(){
    const streak = currentStreak();
    document.getElementById('streakNum').textContent = streak;
    document.getElementById('streakLabel').textContent = streak === 1 ? 'day since last catch' : 'days since last catch';
    if(streak > (meta.bestStreak || 0)){
      meta.bestStreak = streak;
      saveMeta();
    }
    document.getElementById('streakBest').textContent = meta.bestStreak || 0;
  }

  function renderStats(){
    document.getElementById('statTotal').textContent = entries.length;
    const weekAgo = Date.now() - 7*24*60*60*1000;
    const weekCount = entries.filter(e => new Date(e.timestamp).getTime() >= weekAgo).length;
    document.getElementById('statWeek').textContent = weekCount;
    const counts = {L:0, R:0};
    entries.forEach(e => {
      if(e.side === 'L') counts.L++;
      else if(e.side === 'R') counts.R++;
      else if(e.side === 'Both'){ counts.L++; counts.R++; }
    });
    let sideText = '–';
    if(counts.L > 0 || counts.R > 0){
      sideText = counts.L === counts.R ? 'Even' : (counts.L > counts.R ? 'L' : 'R');
    }
    document.getElementById('statSide').textContent = sideText;
  }

  function renderList(){
    const list = document.getElementById('list');
    list.innerHTML = '';
    if(entries.length === 0){
      list.innerHTML = '<div class="empty">No episodes logged yet. Tap the button above the moment it happens.</div>';
      return;
    }
    const sorted = [...entries].sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));
    const groups = {};
    sorted.forEach(e => {
      const key = fmtDay(e.timestamp);
      if(!groups[key]) groups[key] = [];
      groups[key].push(e);
    });
    Object.keys(groups).forEach(dayKey => {
      const dayDiv = document.createElement('div');
      dayDiv.className = 'day-group';
      const label = document.createElement('div');
      label.className = 'day-label';
      label.textContent = dayKey;
      dayDiv.appendChild(label);
      groups[dayKey].forEach(e => {
        const div = document.createElement('div');
        div.className = 'entry';
        const metaBits = [];
        if(e.side) metaBits.push(e.side);
        if(e.duration) metaBits.push(e.duration);
        div.innerHTML = `
          <div class="entry-top">
            <span class="entry-time">${fmtTime(e.timestamp)}</span>
            <span class="entry-meta">${metaBits.join(' · ') || 'no details'}</span>
          </div>
          <div class="entry-detail">
            ${e.notes ? `<div style="margin-bottom:8px;">${escapeHtml(e.notes)}</div>` : ''}
            <button class="edit" data-id="${e.id}">edit entry</button>
            <button class="del" data-id="${e.id}">delete entry</button>
          </div>
        `;
        div.addEventListener('click', (ev) => {
          if(ev.target.classList.contains('del')) return;
          div.classList.toggle('open');
        });
        dayDiv.appendChild(div);
      });
      list.appendChild(dayDiv);
    });
    list.querySelectorAll('.del').forEach(btn => {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const id = btn.getAttribute('data-id');
        entries = entries.filter(e => e.id !== id);
        save();
        renderList();
        renderStats();
        renderStreak();
      });
    });
    list.querySelectorAll('.edit').forEach(btn => {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const id = btn.getAttribute('data-id');
        const entry = entries.find(e => e.id === id);
        if(entry) openEditor(entry);
      });
    });
  }

  function escapeHtml(s){
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function showQuote(){
    const banner = document.getElementById('quoteBanner');
    if(QUOTES.length === 0){ banner.classList.remove('show'); return; }
    const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    document.getElementById('quoteText').textContent = q;
    banner.classList.remove('show');
    void banner.offsetWidth;
    banner.classList.add('show');
  }

  function logNow(){
    const id = 'e' + Date.now() + Math.random().toString(36).slice(2,7);
    const entry = { id, timestamp: new Date().toISOString(), side: null, duration: null, notes: null };
    entries.push(entry);
    save();
    renderList();
    renderStats();
    renderStreak();
    showQuote();
    openToast(entry);
  }

  function openToast(entry){
    pendingId = entry.id;
    pendingSide = new Set();
    document.getElementById('toastLabel').textContent = 'Logged';
    document.getElementById('toastTime').textContent = fmtTime(entry.timestamp);
    document.getElementById('notesInput').value = '';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    updateHipVisual();
    document.getElementById('toast').classList.add('show');
  }

  function openEditor(entry){
    pendingId = entry.id;
    pendingSide = new Set();
    if(entry.side === 'Both'){ pendingSide.add('L'); pendingSide.add('R'); }
    else if(entry.side === 'L'){ pendingSide.add('L'); }
    else if(entry.side === 'R'){ pendingSide.add('R'); }

    document.getElementById('toastLabel').textContent = 'Editing entry from';
    document.getElementById('toastTime').textContent = fmtTime(entry.timestamp);
    document.getElementById('notesInput').value = entry.notes || '';

    document.querySelectorAll('#durationChips .chip').forEach(c => {
      c.classList.toggle('active', c.getAttribute('data-val') === entry.duration);
    });

    updateHipVisual();
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    toast.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function closeToast(){
    document.getElementById('toast').classList.remove('show');
    pendingId = null;
  }

  function updateHipVisual(){
    const left = document.querySelector('#hipLeft circle');
    const right = document.querySelector('#hipRight circle');
    left.setAttribute('fill', pendingSide.has('L') ? '#F7E3E7' : '#F5E9E2');
    left.setAttribute('stroke', pendingSide.has('L') ? '#D88C9A' : '#EEDDD3');
    right.setAttribute('fill', pendingSide.has('R') ? '#F7E3E7' : '#F5E9E2');
    right.setAttribute('stroke', pendingSide.has('R') ? '#D88C9A' : '#EEDDD3');
  }

  document.getElementById('logBtn').addEventListener('click', logNow);
  document.getElementById('toastClose').addEventListener('click', closeToast);

  document.getElementById('hipLeft').addEventListener('click', () => {
    pendingSide.has('L') ? pendingSide.delete('L') : pendingSide.add('L');
    updateHipVisual();
  });
  document.getElementById('hipRight').addEventListener('click', () => {
    pendingSide.has('R') ? pendingSide.delete('R') : pendingSide.add('R');
    updateHipVisual();
  });

  document.getElementById('durationChips').addEventListener('click', (ev) => {
    const chip = ev.target.closest('.chip');
    if(!chip) return;
    document.querySelectorAll('#durationChips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });

  document.getElementById('saveDetails').addEventListener('click', () => {
    if(!pendingId) return;
    const entry = entries.find(e => e.id === pendingId);
    if(!entry) return;
    let side = null;
    if(pendingSide.size === 2) side = 'Both';
    else if(pendingSide.has('L')) side = 'L';
    else if(pendingSide.has('R')) side = 'R';
    entry.side = side;
    const activeChip = document.querySelector('#durationChips .chip.active');
    entry.duration = activeChip ? activeChip.getAttribute('data-val') : null;
    const notes = document.getElementById('notesInput').value.trim();
    entry.notes = notes || null;
    save();
    renderList();
    renderStats();
    closeToast();
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'catch-log-export-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', (ev) => {
    const file = ev.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const imported = JSON.parse(reader.result);
        if(Array.isArray(imported)){
          const existingIds = new Set(entries.map(e => e.id));
          imported.forEach(e => { if(e && e.id && !existingIds.has(e.id)) entries.push(e); });
          save();
          renderList();
          renderStats();
          renderStreak();
        }
      }catch(e){}
    };
    reader.readAsText(file);
    ev.target.value = '';
  });

  load();
  renderList();
  renderStats();
  renderStreak();
})();
</script>
</body>
</html>
